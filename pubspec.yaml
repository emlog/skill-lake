name: skill_lake
description: A local AI agent skill manager app for macOS, built with Flutter.
publish_to: "none"
version: 1.2.3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.7
  path_provider: ^2.1.4
  http: ^1.2.2
  archive: ^3.6.1
  url_launcher: ^6.3.1
  yaml: ^3.1.3
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
